apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: hugo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tunnel-token
                  key: token
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared
              readOnly: true
            - name: creds
              mountPath: /etc/cloudflared/creds
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: cloudflared
        - name: creds
          secret:
            secretName: tunnel-credentials
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared
  namespace: hugo
data:
  config.yaml: |
    tunnel: 358829e7-2dd3-4fbf-bc4c-aeb15b50ac25
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true
    ingress:
      - hostname: mikefrantum.dev
        service: http://hugo.hugo.svc.cluster.local:80
      - hostname: www.mikefrantum.dev
        service: http://hugo.hugo.svc.cluster.local:80
      - service: http_status:404
