apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  strategy:
    type: Recreate            # single writer to the state PVC — never two pods at once
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
        policy-type: app
    spec:
      # NOTE: unlike Forgejo, the official Hermes image expects to start as ROOT.
      # Its entrypoint performs a boot-time chown on /opt/data. Pinning a non-root
      # UID (the Forgejo pattern) can break that step. fsGroup smooths group access.
      securityContext:
        fsGroup: 100
      containers:
        - name: hermes
          # Pinned — bump deliberately (or let Renovate PR it). Latest: v2026.6.19
          image: nousresearch/hermes-agent:v2026.6.19
          args: ["gateway", "run"]
          env:
            - name: TZ
              value: America/Denver
            - name: HERMES_HOME
              value: /opt/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: state
              mountPath: /opt/data
            - name: shared
              mountPath: /opt/shared
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: hermes-state
        - name: shared
          persistentVolumeClaim:
            claimName: hermes-shared
