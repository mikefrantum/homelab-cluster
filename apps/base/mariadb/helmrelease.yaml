apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb
  namespace: mariadb
spec:
  interval: 1h
  chart:
    spec:
      chart: mariadb
      version: ">=26.0.0 <27.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    auth:
      existingSecret: mariadb-credentials
    primary:
      persistence:
        enabled: true
        existingClaim: mariadb-data
    secondary:
      replicaCount: 0
