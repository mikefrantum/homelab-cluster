apiVersion: apps/v1
kind: Deployment
metadata:
  name: hugo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hugo
  template:
    metadata:
      labels:
        app: hugo
    spec:
      initContainers:
        - name: git-clone
          image: alpine/git:latest
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              git config --global --add safe.directory /site
              if [ -d /site/.git ]; then
                echo "Repo exists, pulling latest..."
                cd /site && git pull
              else
                echo "Cloning repo..."
                git clone https://$(FORGEJO_USER):$(FORGEJO_TOKEN)@forgejo.nohermosa.com/mike/mikefrantum-dev.git /site
              fi
          env:
            - name: FORGEJO_USER
              valueFrom:
                secretKeyRef:
                  name: hugo-git
                  key: username
            - name: FORGEJO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hugo-git
                  key: token
          volumeMounts:
            - name: site
              mountPath: /site
      containers:
        - name: hugo
          image: hugomods/hugo:latest
          args:
            - server
            - --bind=0.0.0.0
            - --port=1313
            - --appendPort=false
            - --baseURL=https://mikefrantum.dev
            - -D
          workingDir: /site
          ports:
            - containerPort: 1313
          resources:
            requests:
              memory: "256Mi"
            limits:
              memory: "256Mi"
          volumeMounts:
            - name: site
              mountPath: /site
      volumes:
        - name: site
          persistentVolumeClaim:
            claimName: hugo-data

