apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookshelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookshelf
  template:
    metadata:
      labels:
        app: bookshelf

    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000

      containers:
        - name: bookshelf
          image: ghcr.io/advplyr/audiobookshelf:2.35.1

          envFrom:
            - configMapRef:
                name: bookshelf-configmap

          ports:
            - containerPort: 3005
              protocol: TCP

          volumeMounts:
            - mountPath: /config
              name: bookshelf-config
            - mountPath: /metadata
              name: bookshelf-metadata
            - mountPath: /audiobooks
              name: bookshelf-audiobooks
            - mountPath: /podcasts
              name: bookshelf-podcasts


      volumes:
        - name: bookshelf-audiobooks
          nfs:
            server: 192.168.1.9
            path: /mnt/user/Media/AudioBooks
        - name: bookshelf-podcasts
          nfs:
            server: 192.168.1.9
            path: /mnt/user/Media/Podcasts
        - name: bookshelf-config
          persistentVolumeClaim:
            claimName: bookshelf-config
        - name: bookshelf-metadata
          persistentVolumeClaim:
            claimName: bookshelf-metadata
