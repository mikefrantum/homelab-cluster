apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookshelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookshelf
  template:
    metadata:
      labels:
        app: bookshelf
    spec:
      containers:
        - name: bookshelf
          image: ghcr.io/advplyr/audiobookshelf:2.34.0
          ports:
            - containerPort: 3005
              protocol: TCP
			envFrom:
            - configMapRef:
                name: audiobookshelf-configmap

          ports:
            - containerPort: 3005
              protocol: TCP

          volumeMounts:
            - mountPath: /config
              name: audiobookshelf-config
            - mountPath: /metadata
              name: audiobookshelf-metadata
            - mountPath: /audiobooks
              name: audiobookshelf-audiobooks
    restartPolicy: Always

      volumes:
        - name: bookshelf-audiobooks
          persistentVolumeClaim:
            claimName: bookshelf-audiobooks
        - name: bookshelf-podcasts
          persistentVolumeClaim:
            claimName: bookshelf-podcasts
        - name: bookshelf-config
          persistentVolumeClaim:
            claimName: bookshelf-config
        - name: bookshelf-metadata
          persistentVolumeClaim:
            claimName: bookshelf-metadata
