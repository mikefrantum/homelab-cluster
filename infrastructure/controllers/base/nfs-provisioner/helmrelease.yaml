apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-subdir-external-provisioner
  namespace: kube-system
spec:
  chart:
    spec:
      chart: nfs-subdir-external-provisioner
      version: ">= 4.0.0"
      sourceRef:
        kind: HelmRepository
        name: nfs-subdir-external-provisioner
        namespace: flux-system
  interval: 1h
  values:
    nfs:
      server: 192.168.1.9
      path: /mnt/user/k8s-volumes

    storageClass:
      create: false
      name: unraid-nfs

