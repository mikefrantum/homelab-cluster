apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-config
  namespace: forgejo
data:
  # Server settings
  FORGEJO__service__DISABLE_REGISTRATION: "true"
  FORGEJO__server__DOMAIN: forgejo.nohermosa.com
  FORGEJO__server__ROOT_URL: https://forgejo.nohermosa.com/
  FORGEJO__server__HTTP_PORT: "3000"
  FORGEJO__server__SSH_DOMAIN: forgejo.nohermosa.com
  FORGEJO__server__SSH_PORT: "2222"
  FORGEJO__server__SSH_LISTEN_PORT: "2222"

  # Database - using SQLite for now
  # TODO: migrate to PostgreSQL later
  FORGEJO__database__DB_TYPE: sqlite3
  FORGEJO__database__PATH: /data/forgejo.db

  # Repository storage
  FORGEJO__repository__ROOT: /data/git

  # Logging
  FORGEJO__log__ROOT_PATH: /data/log

  # Security
  FORGEJO__security__INSTALL_LOCK: "true"

  # Actions (CI/CD)
  FORGEJO__actions__ENABLED: "true"

