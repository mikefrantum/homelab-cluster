apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  chart:
    spec:
      chart: forgejo/forgejo
      version: "9.3.1"
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: flux-system
  interval: 1h
  values:
    replicaCount: 1

    persistence:
      enabled: true
      size: 20Gi
      storageClassName: unraid-nfs

    ingress:
      enabled: true
      className: traefik

      hosts:
        - host: forgejo.nohermosa.com
          paths:
            - path: /
              pathType: Prefix

      tls:
        - secretName: forgejo-tls
          hosts:
            - forgejo.nohermosa.com

    config:
      APP_NAME: "Homelab Forgejo"
      server:
        DOMAIN: forgejo.nohermosa.com
        ROOT_URL: https://forgejo.nohermosa.com/
        PROTOCOL: https

    admin:
      username: admin
      email: admin@nohermosa.com

