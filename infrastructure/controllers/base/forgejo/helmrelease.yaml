apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  chart:
    spec:
      chart: forgejo
      version: ">= 9.0.0"
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: flux-system
  interval: 1h
  valuesFrom:
    - kind: ConfigMap
      name: forgejo-values

